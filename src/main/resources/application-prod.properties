# ===================================
# CONFIGURA횄혝횄혮ES PARA PRODU횄혝횄혘O
# ===================================
# Este arquivo cont횄짤m configura횄짠횄쨉es otimizadas para ambiente produtivo
# Copie e ajuste conforme necess횄징rio

# ===================================
# DATABASE - POSTGRESQL
# ===================================
# Em produ횄짠횄짙o, use vari횄징veis de ambiente ou um servi횄짠o de gerenciamento de segredos
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/PAGAMENTOS}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:banco123}

# ===================================
# HIKARICP - POOL DE CONEX횄혮ES OTIMIZADO
# ===================================
# Ajuste conforme a carga esperada da aplica횄짠횄짙o
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000

# ===================================
# JPA / HIBERNATE
# ===================================
# EM PRODU횄혝횄혘O: Nunca use ddl-auto=update ou create
# Use migra횄짠횄쨉es de banco com Flyway ou Liquibase
spring.jpa.hibernate.ddl-mode=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===================================
# SERVER / TOMCAT
# ===================================
# Para permitir acesso externo, use 0.0.0.0
# Para acesso apenas local, use localhost ou comente esta linha
server.address=0.0.0.0
server.port=8080
server.tomcat.connection-timeout=20000
server.tomcat.keep-alive-timeout=60000
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=25
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# ===================================
# LOGGING - PRODU횄혝횄혘O
# ===================================
logging.level.root=WARN
logging.level.org.example.pagamentos=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/pagamentos.log
logging.file.max-size=10MB
logging.file.max-history=30

# ===================================
# UPLOAD DE ARQUIVOS
# ===================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB

# ===================================
# OPENAPI / SWAGGER (Desativar em produ횄짠횄짙o)
# ===================================
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# ===================================
# SEGURAN횄혝A
# ===================================
# Defina uma chave secreta forte para JWT em produ횄짠횄짙o
jwt.secret=${JWT_SECRET:sua-chave-secreta-muito-forte-aqui}
jwt.expiration=86400000

