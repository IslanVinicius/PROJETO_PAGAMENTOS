# ============================================
# CONFIGURAÇÃO DE PRODUÇÃO
# ============================================

spring.application.name=pagamentos

# ============================================
# BANCO DE DADOS POSTGRESQL
# ============================================
# Altere conforme seu servidor de banco de dados
spring.datasource.url=jdbc:postgresql://localhost:5432/PAGAMENTOS1
spring.datasource.username=postgres
spring.datasource.password=banco123

# ============================================
# HIBERNATE / JPA
# ============================================
# Em produção, use 'validate' ou 'none' para não alterar o schema automaticamente
# Use o script SQL gerado para criar o banco manualmente
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ============================================
# SERVIDOR
# ============================================
server.address=0.0.0.0
server.port=8080

# ============================================
# UPLOAD DE ARQUIVOS
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB

# ============================================
# LOGGING (PRODUÇÃO)
# ============================================
logging.level.root=WARN
logging.level.org.example.pagamentos=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================
# DIRETÓRIO PARA IMAGENS/ARQUIVOS
# ============================================
# Configure o caminho absoluto no servidor
app.upload.dir=/opt/pagamentos/uploads
# Ou no Windows: C:/pagamentos/uploads
